<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>豆瓣歌单</title>
</head>
<body>
  <h2 th:text="${title}"></h2>
  <ul>
    <li th:each="sl,it: ${sls}">
      <span th:text="${it.count}"></span>
      <div th:text="${sl.name}"></div>
      <span th:text="${sl.author}"></span>
    </li>
  </ul>
</body>
</html>
